name: CI

on:
  push:
    branches: [master, "feature/**", "fix/**"]
  pull_request:
    branches: [master]

# Cancel in-flight runs on the same branch when a newer commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Type-check + vite build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Pinned to match engines.node: >=22.0.0 <24.0.0 (electron-packager
          # incompatibility on Node 24 — see CONTRIBUTING.md).
          node-version: "22.22.3"
          cache: "npm"

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Type-check
        run: npx tsc --noEmit

      - name: Vite build (smoke test the standalone Vite runner)
        run: npm run vite:build

  build-installer:
    name: Build installer (${{ matrix.os }})
    needs: typecheck
    # Skip on PRs from forks — fork PRs don't have the secrets needed for
    # publish, and we only want the installer build on trusted branches.
    if: github.event_name == 'push'
    strategy:
      fail-fast: false  # don't cancel other-OS builds when one fails
      matrix:
        include:
          - os: windows-latest
            label: windows
            dist_cmd: npm run dist
            artifact_glob: |
              dist/*.exe
              dist/*.exe.blockmap
              dist/latest.yml
              dist/builder-debug.yml
          - os: macos-latest
            label: macos
            dist_cmd: npm run dist:mac
            artifact_glob: |
              dist/*.dmg
              dist/*.dmg.blockmap
              dist/*.zip
              dist/latest-mac.yml
              dist/builder-debug.yml
          - os: ubuntu-latest
            label: linux
            dist_cmd: npm run dist:linux
            artifact_glob: |
              dist/*.AppImage
              dist/*.deb
              dist/*.rpm
              dist/latest-linux.yml
              dist/builder-debug.yml
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22.22.3"
          cache: "npm"

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Install Linux build deps (rpm + libfuse2 for AppImage)
        # ubuntu-latest doesn't ship `rpm` and electron-builder needs it
        # for the .rpm target. libfuse2 is needed for the AppImage runtime.
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm libfuse2

      - name: Enable Windows Developer Mode
        # Windows-only workaround for electron-builder's winCodeSign
        # cache extraction (creates macOS dylib symlinks via bundled
        # 7za; needs SeCreateSymbolicLinkPrivilege). macOS + Linux
        # runners don't need this.
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Set-ItemProperty -Path "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\AppModelUnlock" `
            -Name "AllowDevelopmentWithoutDevLicense" -Value 1 -Type DWord -Force

      - name: Rebuild node-pty against Electron ABI
        # Defensive on all platforms — node-pty ships Node-ABI prebuilds;
        # Electron rebuild ensures the bundled binary works at runtime.
        # Non-fatal: proceed regardless.
        continue-on-error: true
        run: npx --no-install @electron/rebuild -m . --only node-pty

      - name: Build installer
        run: ${{ matrix.dist_cmd }}
        env:
          CI: "true"
          DEBUG: "electron-builder"

      - name: Upload artifact
        # Always upload, even on build failure, so debug logs can be
        # post-mortemed via builder-debug.yml.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-code-studio-${{ matrix.label }}-installer
          path: ${{ matrix.artifact_glob }}
          retention-days: 30
          if-no-files-found: warn
